<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>intentai.io – Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .logo span {
      color: #7c6ef5;
    }

    .tagline {
      font-size: 1.05rem;
      color: #888;
      margin-bottom: 3rem;
      max-width: 420px;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      background: rgba(124, 110, 245, 0.15);
      color: #7c6ef5;
      border: 1px solid rgba(124, 110, 245, 0.3);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    .contact {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: #555;
    }

    .contact a {
      color: #7c6ef5;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    .blob {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,110,245,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="blob"></div>
  <div class="content">
    <div class="badge">Coming Soon</div>
    <div class="logo">intent<span>ai</span>.io</div>
    <p class="tagline">Something new is on the way. Check back soon.</p>
    <div class="contact">
      Questions? <a href="mailto:rojomba17@gmail.com">Get in touch</a>
    </div>
  </div>
</body>
</html>
